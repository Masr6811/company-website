<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">
    <title>Contact Our US Team | Sunnytrades</title>

</head>
<body>
    <nav>
        <div class="logo">SUNNY<span>TRADES</span></div>
        <ul class="nav-links">

    <section>
        <div class="section-header">
            <h2>Ready to Scale Your Brand?</h2>
            <p>Get in touch with our US logistics experts today.</p>
        </div>
        <div class="form-box">
            <form action="#">
                <label>Company Name</label>
                <input type="text" placeholder="Your Company Name">
                
                <label>Email Address</label>
                <input type="email" placeholder="email@example.com">
                
                <label>Service Interested In</label>
                <select>
                    <option>US Warehousing & Dropshipping</option>
                    <option>Bedding POD Production</option>
                    <option>Full Supply Chain Support</option>
                </select>
                
                <label>Message</label>
                <textarea rows="5" placeholder="How can we help your business?"></textarea>
                
                <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer; margin-top: 1rem;">Send Inquiry</button>
            </form>
        </div>
    </section>
